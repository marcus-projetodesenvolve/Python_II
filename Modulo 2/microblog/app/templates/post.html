{% extends "base.html" %}
{% block content %}
<h2>Novo Post</h2>
<form action="{{ url_for('post') }}" method="post">
    <div class="form-group"><label for="body">O que quer compartilhar?</label><textarea id="body" name="body" rows="4" maxlength="140" required></textarea></div>
    <button type="submit">Publicar</button>
</form>
{% endblock %}
