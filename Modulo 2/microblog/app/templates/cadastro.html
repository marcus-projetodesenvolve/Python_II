{% extends "base.html" %}
{% block content %}
<h2>Criar Conta</h2>
<form action="{{ url_for('cadastro') }}" method="post">
    <div class="form-group"><label for="username">Usuário</label><input type="text" id="username" name="username" required></div>
    <div class="form-group"><label for="password">Senha</label><input type="password" id="password" name="password" required></div>
    <div class="form-group"><label for="avatar_url">URL da Foto de Perfil</label><input type="text" id="avatar_url" name="avatar_url"></div>
    <div class="form-group"><label for="bio">Biografia</label><textarea id="bio" name="bio" rows="3"></textarea></div>
    <button type="submit">Cadastrar</button>
</form>
{% endblock %}
