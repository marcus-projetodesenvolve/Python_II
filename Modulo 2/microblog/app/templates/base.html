<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>{{ title }} - Microblog</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 0; }
        header { background-color: #2c3e50; padding: 15px; display: flex; justify-content: space-between; color: white; }
        header a { color: white; text-decoration: none; margin-left: 15px; font-weight: bold; }
        .container { max-width: 600px; margin: 30px auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="password"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #3498db; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; width: 100%; }
        .post-card { border-bottom: 1px solid #eee; padding: 15px 0; display: flex; gap: 15px; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: #ccc; }
        .flash-msg { background: #e74c3c; color: white; padding: 10px; margin-bottom: 15px; border-radius: 4px; }
    </style>
</head>
<body>
<header>
    <div style="font-weight: bold;">Microblog</div>
    <nav>
        <a href="{{ url_for('index') }}">Home</a>
        {% if current_user.is_authenticated %}
            <a href="{{ url_for('post') }}">Escrever Post</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        {% else %}
            <a href="{{ url_for('login') }}">Login</a>
            <a href="{{ url_for('cadastro') }}">Cadastro</a>
        {% endif %}
    </nav>
</header>
<div class="container">
    {% with messages = get_flashed_messages() %}
        {% if messages %}{% for message in messages %}<div class="flash-msg">{{ message }}</div>{% endfor %}{% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
